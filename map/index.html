    .app { height: 100vh; display: grid; grid-template-columns: 340px 1fr; }
    .sidebar { background: rgba(255,255,255,.97); box-shadow: 3px 0 18px rgba(0,0,0,.12); z-index: 10; overflow: hidden; }
    .header { padding: 22px 20px 16px; border-bottom: 1px solid #eee; }
    .header h1 { margin: 0 0 8px; font-size: 22px; }
    .header p { margin: 0; color: #667085; font-size: 13px; line-height: 1.6; }
    .notice { margin: 12px 16px; padding: 10px 12px; background: #eef6ff; border: 1px solid #91caff; border-radius: 8px; color: #145399; font-size: 12px; line-height: 1.5; }
    .spot-list { height: calc(100vh - 184px); overflow-y: auto; padding: 0 10px 20px; }
    .spot-item { padding: 13px 12px; margin: 7px 0; border-radius: 10px; cursor: pointer; border: 1px solid transparent; transition: .2s; }
    .spot-item:hover, .spot-item.active { background: #f0f7ff; border-color: #91caff; }
    .spot-name { font-weight: 700; font-size: 15px; margin-bottom: 5px; }
    .spot-desc { color: #667085; font-size: 12px; line-height: 1.55; }
    .coord-state { margin-top: 6px; font-size: 11px; color: #d46b08; }
    #container { width: 100%; height: 100vh; }
    .info-card { width: 290px; padding: 4px; }
    .info-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; background: #eee; }
    .info-card h3 { margin: 10px 0 7px; font-size: 18px; }
    .info-card p { color: #555; line-height: 1.6; margin: 0 0 8px; }
    .opening { font-size: 12px; color: #1677ff; line-height: 1.5; }
    .source { margin-top: 6px; font-size: 11px; color: #8c8c8c; line-height: 1.4; }
    .spot-marker { position: relative; display: flex; align-items: center; gap: 6px; min-width: 92px; max-width: 138px; padding: 4px 8px 4px 4px; background: #fff; border: 1px solid rgba(22,119,255,.35); border-radius: 18px; box-shadow: 0 4px 14px rgba(0,0,0,.18); }
    .spot-marker img { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; flex: 0 0 auto; background: #e8edf3; }
    .spot-marker span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #1f2937; font-size: 12px; font-weight: 700; }
    .spot-marker::after { content: ""; position: absolute; left: 50%; bottom: -12px; width: 10px; height: 10px; background: #e53935; border: 2px solid #fff; border-radius: 50%; box-shadow: 0 2px 7px rgba(0,0,0,.28); transform: translateX(-50%); }
    @media (max-width: 760px) {
      body { overflow: auto; }
      .app { min-height: 100vh; height: auto; grid-template-columns: 1fr; grid-template-rows: 42vh auto; }
      .sidebar { order: 2; }
      #container { height: 42vh; }
      .spot-list { height: auto; max-height: none; }
    }

<script>
  window._AMapSecurityConfig = {
    securityJsCode: "YOUR_AMAP_SECURITY_CODE"
  };
</script>
<script src="https://webapi.amap.com/maps?v=2.0&key=YOUR_AMAP_KEY&plugin=AMap.ControlBar,AMap.ToolBar,AMap.Scale"></script>
<script>
  const scenicSpots = JSON.parse(document.getElementById("scenicSpotsData").textContent);
  const SCENIC_CENTER = [120.1005, 31.426];
  const SCENIC_BOUNDS = new AMap.Bounds(
    new AMap.LngLat(120.0957, 31.4207),
    new AMap.LngLat(120.1053, 31.431)
  );
  const DRAG_BOUNDS = new AMap.Bounds(
    new AMap.LngLat(120.092, 31.4185),
    new AMap.LngLat(120.1085, 31.433)
  );

  const map = new AMap.Map("container", {
    viewMode: "3D",
    zoom: 16,
    zooms: [16, 19],
    pitch: 58,
    rotation: -18,
    center: SCENIC_CENTER,
    rotateEnable: true,
    pitchEnable: true,
    showBuildingBlock: true,
    mapStyle: "amap://styles/normal"
  });

  map.addControl(new AMap.ControlBar({ position: { right: "20px", top: "20px" } }));
  map.addControl(new AMap.ToolBar({ position: { right: "20px", top: "130px" } }));
  map.addControl(new AMap.Scale());
  map.setLimitBounds(DRAG_BOUNDS);

  const markerMap = new Map();
  const spotList = document.getElementById("spotList");

  function imageUrl(spot) {
    return new URL(spot.image, window.location.href).href;
  }

  function makePopup(spot) {
    const coordinateText = `${spot.lng.toFixed(6)}, ${spot.lat.toFixed(6)}`;
    return `
      <div class="info-card">
        <img src="${imageUrl(spot)}" alt="${spot.name}" onerror="this.style.display='none'">
        <h3>${spot.name}</h3>
        <p>${spot.description}</p>
        <div class="opening">开放/演出：${spot.openingInfo}</div>
        <div class="source">坐标：${coordinateText} · ${spot.coordinateLevel}<br>图片：${spot.imageTitle}</div>
      </div>
    `;
  }

  function setActiveItem(id) {
    document.querySelectorAll(".spot-item").forEach((node) => {
      node.classList.toggle("active", node.dataset.id === id);
    });
  }

  scenicSpots.forEach((spot) => {
    const item = document.createElement("div");
    item.className = "spot-item";
    item.dataset.id = spot.id;
    item.innerHTML = `
      <div class="spot-name">${spot.id} · ${spot.name}</div>
      <div class="spot-desc">${spot.description}</div>
      <div class="coord-state">真实坐标 · ${spot.lng.toFixed(6)}, ${spot.lat.toFixed(6)}</div>
    `;
    spotList.appendChild(item);

    const position = [spot.lng, spot.lat];
    const marker = new AMap.Marker({
      position,
      title: spot.name,
      anchor: "bottom-center",
      content: `<div class="spot-marker"><img src="${imageUrl(spot)}" alt="" onerror="this.style.display='none'"><span>${spot.name}</span></div>`,
      offset: new AMap.Pixel(0, -8)
    });

    const infoWindow = new AMap.InfoWindow({
      content: makePopup(spot),
      offset: new AMap.Pixel(0, -35)
    });

    marker.on("click", () => {
      setActiveItem(spot.id);
      infoWindow.open(map, position);
    });
    map.add(marker);
    markerMap.set(spot.id, { marker, infoWindow, position });

    item.addEventListener("click", () => {
      setActiveItem(spot.id);
      map.setZoomAndCenter(18, position, false, 700);
      map.setPitch(62);
      infoWindow.open(map, position);
    });
  });

  map.setBounds(SCENIC_BOUNDS, false, [30, 30, 30, 30]);
</script>
