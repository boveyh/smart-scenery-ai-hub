spring:
  datasource:
    url: jdbc:h2:mem:smart_scenery;DB_CLOSE_DELAY=-1;MODE=MYSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
      continue-on-error: true

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
    open-in-view: false

  data:
    redis:
      host: localhost
      port: 6379

  h2:
    console:
      enabled: true
      path: /h2-console

elasticsearch:
  hosts:

ai-engine:
  base-url: http://localhost:8000
  timeout: 30000

logging:
  level:
    com.smartscenery: DEBUG
